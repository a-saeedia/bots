services:
  - type: web
    name: acap-quiz-bot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_ORIGIN
        sync: false
      - key: BALE_BOT_TOKEN
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: PORT
        value: "3000"
